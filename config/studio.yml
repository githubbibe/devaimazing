# Configuration globale devaimazing

# Modèles LLM
models:
  pm_opus: claude-opus-4-8         # Phase 1 : cadrage (coûteux, rare)
  pm_sonnet: claude-sonnet-4-6     # Phase 3 : raffinement (mode croisière)
  agent_auditor: claude-sonnet-4-6 # Architecte (phases 2, 5, 9) + Sécu (phase 8)
  agents_local: qwen2.5:7b-instruct # Back, Front, Test

# Ollama
ollama:
  base_url: http://localhost:11434
  timeout_seconds: 600
  max_retries: 3
  # Fenêtre de contexte (tokens) passée à Ollama via options.num_ctx. Sans ce
  # réglage, Ollama tronque silencieusement à son défaut (2048) — augmenter si
  # les logs de trace montrent tokens_prompt collé à num_ctx alors que
  # prompt_chars grossit (feedback tronqué, voir docs/roadmap.md 2026-07-16).
  # Relevé à 32768 le 2026-07-19 (run-20260714-205712, todo-list) : le
  # feedback cumulé de back a fait grimper tokens_prompt de 4537 à 8950 sur
  # 11 tours consécutifs (croissance ~400-500 tokens/tour) — 16384 restait
  # suffisant sur ce run mais la tendance annonçait un dépassement à terme.
  # 32768 = context_length natif de qwen2.5:7b-instruct (voir `ollama show`) :
  # plafond du modèle, pas de marge artificielle en-deçà.
  num_ctx: 32768

# Claude Code CLI
claude_code:
  timeout_seconds: 300
  output_format: json

# SAST (phase 8, avant agent Sécu)
sast:
  enabled: true
  tools:
    - name: bandit
      command: bandit -r {target_dir} -f json
    - name: semgrep
      command: semgrep --config=auto {target_dir} --json
  fail_on_severity: HIGH  # CRITICAL et HIGH bloquent, les autres sont signalés

# Checkpoints de validation humaine
checkpoints:
  phase_1_cadrage: true
  phase_2_audit_amont: true
  phase_3_fiches: true
  phase_5_audit_stubs: true
  phase_9_audit_aval: true

# Retry agents
agents:
  max_iterations: 3
  retry_delay_seconds: 5
  # Tentatives de correction ciblée DANS une même activation d'un agent
  # producteur (Back/Front/Test), après un échec de tools.pyenv.verify_python_files
  # (syntaxe/import) — distinct de max_iterations, qui borne les activations
  # complètes successives (nouvelle lecture de fiche, nouvel appel outer via
  # le graphe). But : transformer plusieurs échecs WAITING_HUMAN en un seul,
  # en corrigeant immédiatement dans le même tour (voir docs/roadmap.md,
  # 2026-07-20). Ne couvre que ce que verify_python_files détecte
  # (syntaxe/import) — pas les écarts sémantiques avec la fiche.
  inner_retry_limit: 3

# Métriques
metrics:
  db_path: ~/.devaimazing/metrics.db
  prometheus_port: 9091
  export_interval_seconds: 15

# State LangGraph
state:
  db_path: ~/.devaimazing/state.db

# Git
git:
  commit_prefix_convention: true  # Conventional commits (feat:, fix:, docs:, etc.)
  sign_commits: false             # GPG signing (activer si clé disponible)
  base_branch: develop
  branch_prefix: studio/          # studio/<slug-feature>-<hash5>
  commit_per_task: true           # commit à la fin de chaque tâche d'agent, pas seulement en phase 10

# Notifications (ntfy - solution transitoire avant PWA push natif)
notifications:
  provider: ntfy
  ntfy:
    server_url: https://ntfy.sh
    topic: <PLACEHOLDER_TOPIC>    # à remplacer par un topic unique et non devinable
  no_link_in_message: true        # message auto-suffisant, pas de lien
  notify_on:
    - agent_failure
    - checkpoint_pending
    - run_completed

# Logging
logging:
  level: INFO
  format: json
  file: ~/.devaimazing/studio.log
