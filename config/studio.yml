# Configuration globale devaimazing

# Modèles LLM
models:
  pm_opus: claude-opus-4-8        # Phase 1 : cadrage (coûteux, rare)
  pm_sonnet: claude-sonnet-4-6    # Phase 3 : raffinement (mode croisière)
  agents_local: qwen2.5:7b-instruct  # Tous les agents locaux

# Ollama
ollama:
  base_url: http://localhost:11434
  timeout_seconds: 120
  max_retries: 3

# Claude Code CLI
claude_code:
  timeout_seconds: 300
  output_format: json

# Checkpoints de validation humaine
# true = attendre validation avant de continuer
# false = continuer automatiquement
checkpoints:
  phase_1_cadrage: true
  phase_2_audit_amont: true
  phase_3_fiches: true
  phase_5_audit_stubs: true
  phase_9_audit_aval: true

# Retry agents locaux
agents:
  max_iterations: 3       # Nombre max d'itérations avant fallback manuel
  retry_delay_seconds: 5  # Délai entre itérations

# Métriques
metrics:
  db_path: ~/.devaimazing/metrics.db
  prometheus_port: 9091
  export_interval_seconds: 15

# State LangGraph
state:
  db_path: ~/.devaimazing/state.db

# Git
git:
  commit_prefix_convention: true  # Conventional commits (feat:, fix:, docs:, etc.)
  sign_commits: false              # GPG signing (activer si clé disponible)

# Notifications
notifications:
  telegram_enabled: false          # Activer après config OpenClaw
  notify_on_checkpoint: true
  notify_on_run_complete: true
  notify_on_failure: true

# Logging
logging:
  level: INFO                      # DEBUG en développement
  format: json                     # json ou text
  file: ~/.devaimazing/studio.log
